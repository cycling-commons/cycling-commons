<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" integrity="sha384-uTttxo/aOKbdE5RlD/SPzSDoDmNvGlUYPjONi2MN/b7c9HPSvW07OIuyP7uL6jxK" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="fonts.css" />
<style>
  :root{--ink:#101E16;--paper:#EFE6D4;--paper-deep:#E2D5BC;--spruce:#1C3A2A;--spruce-lift:#2C5440;--trail:#FF5A1F;--clay:#B5532E;--glacier:#8FB6A8;--ochre:#C8923A;
    --serif:"Bricolage Grotesque",system-ui,sans-serif;--sans:"Spline Sans",system-ui,sans-serif;--mono:"Spline Sans Mono",monospace;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);color:var(--ink);height:100svh;overflow:hidden}
  a{color:inherit;text-decoration:none}
  .app{display:grid;grid-template-columns:360px 1fr;grid-template-rows:minmax(0,1fr);height:100svh}

  .rail{background:var(--ink);color:var(--paper);display:flex;flex-direction:column;border-right:1px solid var(--spruce-lift)}
  .rh{padding:1.2rem 1.4rem;border-bottom:1px solid rgba(239,230,212,.14)}
  .rh .brand{font-family:var(--serif);font-weight:600;font-size:1.5rem}.rh .brand b{color:var(--trail);font-style:italic}
  .rh .sub{display:flex;align-items:center;gap:.6rem;margin-top:.5rem}
  .rh .role{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;background:var(--spruce-lift);padding:.2rem .5rem;border-radius:30px}
  .rh .pend{font-family:var(--mono);font-size:.68rem;letter-spacing:.08em;color:var(--ochre)}
  .rail-nav{display:flex;flex-wrap:wrap;gap:.2rem .9rem;margin-top:.8rem}
  .rail-nav a{font-family:var(--mono);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(239,230,212,.6);transition:color .2s}
  .rail-nav a:hover,.rail-nav a.on{color:var(--trail)}
  .qlist{flex:1;overflow-y:auto}
  .qlist::-webkit-scrollbar{width:6px}.qlist::-webkit-scrollbar-thumb{background:var(--spruce-lift);border-radius:3px}
  .q{padding:1rem 1.4rem;border-bottom:1px solid rgba(239,230,212,.09);cursor:pointer;transition:background .15s}
  .q:hover{background:rgba(239,230,212,.05)}
  .q.sel{background:rgba(255,90,31,.12);border-left:3px solid var(--trail);padding-left:calc(1.4rem - 3px)}
  .q .qt{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
  .q .tag{font-family:var(--mono);font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .4rem;border-radius:3px;color:var(--ink)}
  .q .when{font-family:var(--mono);font-size:.58rem;color:rgba(239,230,212,.45);margin-left:auto}
  .q h4{font-size:.96rem;font-weight:500;margin-bottom:.2rem}
  .q .meta{font-family:var(--mono);font-size:.6rem;letter-spacing:.04em;color:rgba(239,230,212,.5)}
  .rf{padding:.9rem 1.4rem;border-top:1px solid rgba(239,230,212,.14);font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;color:rgba(239,230,212,.55);display:flex;justify-content:space-between}
  .rf kbd{background:var(--spruce-lift);padding:.1rem .35rem;border-radius:3px;color:var(--paper)}

  .map-wrap{position:relative;flex:1;min-height:0}
  .mapcol{display:flex;flex-direction:column;min-height:0}
  #map{position:absolute;inset:0;background:var(--paper-deep)}
  .maplibregl-canvas{filter:grayscale(.42) sepia(.2) saturate(.8) contrast(.95) brightness(1.03)}
  .maplibregl-ctrl-attrib{font-family:var(--mono);font-size:.6rem}
  .mp{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;background:var(--ochre);border:2px dashed var(--ink);box-shadow:0 0 0 4px rgba(200,146,58,.3);font-size:.8rem;animation:pulse 2s infinite}
  .mp.sel{background:var(--trail);box-shadow:0 0 0 6px rgba(255,90,31,.35)}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(200,146,58,.3)}50%{box-shadow:0 0 0 9px rgba(200,146,58,.05)}}

  .review{position:absolute;top:1.2rem;right:1.2rem;width:340px;max-width:calc(100% - 2.4rem);background:var(--ink);color:var(--paper);border-radius:10px;z-index:1000;box-shadow:0 18px 50px -12px rgba(20,22,14,.6);overflow:hidden;display:none}
  .review.on{display:block}
  .rv-head{padding:1.2rem 1.3rem .9rem}
  .rv-head .tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;padding:.2rem .45rem;border-radius:3px;color:var(--ink)}
  .rv-head h3{font-family:var(--serif);font-weight:600;font-size:1.3rem;margin:.5rem 0 .3rem;line-height:1.1}
  .rv-head .meta{font-family:var(--mono);font-size:.6rem;letter-spacing:.06em;color:rgba(239,230,212,.55)}
  .rv-body{padding:0 1.3rem 1rem;font-size:.9rem;line-height:1.5;color:rgba(239,230,212,.9)}
  .diff{background:rgba(239,230,212,.06);border-radius:6px;padding:.7rem .9rem;margin-top:.6rem;font-size:.85rem}
  .diff .was{color:rgba(239,230,212,.5);text-decoration:line-through}
  .diff .now{color:var(--trail)}
  .rv-acts{display:flex;gap:.5rem;padding:1rem 1.3rem;border-top:1px solid rgba(239,230,212,.12)}
  .rv-acts button{flex:1;font-family:var(--sans);font-weight:700;font-size:.82rem;padding:.7rem;border-radius:5px;border:none;cursor:pointer}
  .ap{background:#3e7d4f;color:#fff}.rj{background:transparent;color:var(--clay);border:1.5px solid var(--clay)!important}.ni{background:transparent;color:rgba(239,230,212,.8);border:1.5px solid rgba(239,230,212,.3)!important}
  .clear{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#5a5d4d;z-index:500;pointer-events:none}
  .clear .ic{font-size:2.4rem}.clear h3{font-family:var(--serif);font-size:1.4rem;margin-top:.4rem}
</style>
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" type="image/svg+xml" href="brand/logo-favicon.svg" />
<script defer src="analytics.js"></script>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="rh">
      <a class="brand" href="index.html" style="flex:none"><img src="brand/logo-nav.svg" alt="Cycling Commons" style="height:1.8rem;display:block"></a>
      <div class="sub"><span class="role">⚑ Curator</span><span class="pend"><b id="pc">0</b> pending review</span></div>
      <nav class="rail-nav"><a href="map.html">Map</a><a href="regions.html">Regions</a><a href="vote.html">Vote</a><a href="developers.html">Developers</a><a href="about.html">About</a><a href="login.html">Account</a></nav>
    </div>
    <div class="qlist" id="qlist"></div>
    <div class="rf"><span>Moderation queue · Wallonia</span><span><kbd>J</kbd><kbd>K</kbd> move · <kbd>A</kbd> approve · <kbd>R</kbd> reject</span></div>
  </aside>

  <div class="mapcol">
    <div style="background:rgba(200,146,58,.16);border-bottom:1px solid rgba(200,146,58,.55);color:#6b5320;text-align:center;padding:.6rem 1rem;font-size:.82rem;line-height:1.4"><b style="color:#B5532E">Demo</b> — a preview of the curator review flow. Launching 2026.</div>
  <main class="map-wrap">
    <div id="map"></div>
    <div class="clear" id="clear" style="display:none"><div class="ic">◬</div><h3>Queue clear</h3><div>Nothing left to review. Nice.</div></div>
    <div class="review" id="review"></div>
  </main>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js" integrity="sha384-5+cfbwT0iiub6VsQAdn6yz16nr6sDiQoHx6tm4O8OVYXHYOxcffFmCJBL0dgdvGp" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script>
  const TYPES={ new:{l:'New place',c:'#FF5A1F',ic:'＋'}, edit:{l:'Edit',c:'#8FB6A8',ic:'✎'}, hazard:{l:'Hazard',c:'#C8923A',ic:'⚠'}, photo:{l:'Photo',c:'#B5532E',ic:'◳'} };
  let PEND=[
    {id:1,type:'new',title:'Côte de la Vecquée',ll:[50.47,5.86],who:'rider#4f2a',when:'2h ago',body:'New climb · 3.1 km · avg 6.4% · paved. Submitted with gradient profile.'},
    {id:2,type:'hazard',title:'Road closure · N66',ll:[50.42,5.80],who:'rider#9c01',when:'3h ago',body:'Reported closed for roadworks. Suggested detour via N645.'},
    {id:3,type:'edit',title:'Repair station · Malmedy',ll:[50.426,6.027],who:'rider#1ab8',when:'5h ago',was:'Hours: 24/7',now:'Hours: closed Sundays'},
    {id:4,type:'photo',title:'Signal de Botrange — viewpoint',ll:[50.501,6.094],who:'rider#7d33',when:'1d ago',body:'Photo submitted (CC BY-SA 4.0, own work). Awaiting check for provenance.'},
    {id:5,type:'new',title:'Gîte des Fagnes',ll:[50.49,6.05],who:'rider#2e55',when:'1d ago',body:'New bike-friendly stay · secure storage · drying room · packed breakfast.'},
    {id:6,type:'edit',title:'Fountain · Spa centre',ll:[50.4925,5.8639],who:'rider#88fa',when:'2d ago',was:'Potable: yes',now:'Potable: seasonal (frost shut-off)'}
  ];
  let sel=null;
  const map=new maplibregl.Map({container:'map',style:'https://tiles.openfreemap.org/styles/liberty',
    center:[5.95,50.46],zoom:9,attributionControl:false});
  map.addControl(new maplibregl.AttributionControl({customAttribution:'© OpenStreetMap contributors · ODbL'}),'bottom-right');
  map.addControl(new maplibregl.NavigationControl({showCompass:false}),'bottom-left');
  let markers={};

  function renderMarkers(){
    Object.values(markers).forEach(m=>m.remove());markers={};
    PEND.forEach(it=>{
      const t=TYPES[it.type];
      const el=document.createElement('div');
      el.className='mp'+(sel===it.id?' sel':'');
      el.style.background=sel===it.id?'var(--trail)':t.c;
      el.textContent=t.ic;
      el.addEventListener('click',ev=>{ev.stopPropagation();select(it.id);});
      const m=new maplibregl.Marker({element:el}).setLngLat([it.ll[1],it.ll[0]]).addTo(map);
      markers[it.id]=m;
    });
  }
  function renderQueue(){
    const el=document.getElementById('qlist');el.innerHTML='';
    PEND.forEach(it=>{
      const t=TYPES[it.type];
      const d=document.createElement('div');d.className='q'+(sel===it.id?' sel':'');
      d.innerHTML=`<div class="qt"><span class="tag" style="background:${t.c}">${t.l}</span><span class="when">${it.when}</span></div>
        <h4>${it.title}</h4><div class="meta">${it.who} · ${it.ll[0].toFixed(3)}°N ${it.ll[1].toFixed(3)}°E</div>`;
      d.onclick=()=>select(it.id);el.appendChild(d);
    });
    document.getElementById('pc').textContent=PEND.length;
    document.getElementById('clear').style.display=PEND.length?'none':'flex';
  }
  function select(id){
    sel=id;const it=PEND.find(x=>x.id===id);if(!it){closeReview();return;}
    map.flyTo({center:[it.ll[1],it.ll[0]],zoom:12});
    const t=TYPES[it.type];
    const diff = it.was?`<div class="diff"><div class="was">${it.was}</div><div class="now">${it.now}</div></div>`:'';
    document.getElementById('review').innerHTML=`
      <div class="rv-head"><span class="tag" style="background:${t.c}">${t.l}</span>
        <h3>${it.title}</h3><div class="meta">${it.who} · ${it.when} · ${it.ll[0].toFixed(3)}°N ${it.ll[1].toFixed(3)}°E</div></div>
      <div class="rv-body">${it.body||''}${diff}</div>
      <div class="rv-acts"><button class="ap" onclick="act(${id},1)">Approve</button><button class="rj" onclick="act(${id},0)">Reject</button><button class="ni" onclick="closeReview()">Needs info</button></div>`;
    document.getElementById('review').classList.add('on');
    renderQueue();renderMarkers();
  }
  function closeReview(){document.getElementById('review').classList.remove('on');sel=null;renderQueue();renderMarkers();}
  function act(id,approve){
    PEND=PEND.filter(x=>x.id!==id);
    renderQueue();
    if(PEND.length){ const next=PEND[0].id; select(next); } else { closeReview(); }
  }
  // keyboard
  document.addEventListener('keydown',e=>{
    if(!PEND.length)return;
    const i=PEND.findIndex(x=>x.id===sel);
    if(e.key==='j'||e.key==='J'){select(PEND[Math.min((i<0?-1:i)+1,PEND.length-1)].id)}
    if(e.key==='k'||e.key==='K'){select(PEND[Math.max((i<0?1:i)-1,0)].id)}
    if((e.key==='a'||e.key==='A')&&sel)act(sel,1);
    if((e.key==='r'||e.key==='R')&&sel)act(sel,0);
  });
  renderQueue();renderMarkers();
</script>
<script src="a11y.js"></script>
  <script src="version.js"></script>
</body>
</html>
