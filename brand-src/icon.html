<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>App icon</title>
<style>
  html,body{margin:0;width:100vw;height:100vh;overflow:hidden}
  /* ink square; mark sits in the inner ~58% so it survives Android maskable crop */
  .icon{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;
    background:#101E16}
  .icon svg{height:58%;width:auto;display:block}
</style>
</head>
<body>
<div class="icon">
  <svg viewBox="0 0 100 130" role="img" aria-label="Cycling Commons">
    <path fill="#EFE6D4" fill-rule="evenodd" d="M50 8 C31 8 16 23 16 42 C16 68 50 124 50 124 C50 124 84 68 84 42 C84 23 69 8 50 8 Z M76 42 A26 26 0 1 0 24 42 A26 26 0 1 0 76 42 Z"/>
    <line x1="50" y1="36.5" x2="50" y2="20.5" stroke="#FF5A1F" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="54.76" y1="39.25" x2="68.62" y2="31.25" stroke="#FF5A1F" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="54.76" y1="44.75" x2="68.62" y2="52.75" stroke="#FF5A1F" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="50" y1="47.5" x2="50" y2="63.5" stroke="#FF5A1F" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="45.24" y1="44.75" x2="31.38" y2="52.75" stroke="#FF5A1F" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="45.24" y1="39.25" x2="31.38" y2="31.25" stroke="#FF5A1F" stroke-width="3.2" stroke-linecap="round"/>
    <circle fill="#101E16" cx="50" cy="42" r="4"/>
  </svg>
</div>
</body>
</html>
