# Dev-only static server for the Atlas demo.
# No browser caching + no sendfile/etag, so edits to atlas/demo/ always show on reload
# (avoids the "I don't see my change" stale-cache / WSL2 bind-mount confusion).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index map.html index.html;

    sendfile off;          # bind-mounted files over WSL2 can serve stale with sendfile on
    etag off;

    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ =404;
    }
}
