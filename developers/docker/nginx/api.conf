# nginx vhost for the Symfony API — fronts PHP-FPM (the `api` service).
# Mirrors the production request path: nginx -> php-fpm -> Symfony.
server {
    listen 80;
    server_name _;
    root /app/public;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    # only the front controller is executed; everything routes through it
    location ~ ^/index\.php(/|$) {
        fastcgi_pass api:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # reject direct access to any other .php file
    location ~ \.php$ {
        return 404;
    }

    client_max_body_size 16m;
}
